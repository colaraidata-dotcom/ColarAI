name: Guardian Security Review

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          custom-security-scan-instructions: security/scan-instructions.txt
          false-positive-filtering-instructions: security/false-positive-filter.txt
          exclude-directories: "node_modules,dist,build,.git,.next,test-results"
